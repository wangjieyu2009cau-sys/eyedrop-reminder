<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼药水提醒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .header .date { color: #666; font-size: 16px; }
        
        /* 激励系统样式 */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            color: white;
        }
        .stat-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        
        .achievements {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .achievements h3 { font-size: 16px; color: #333; margin-bottom: 10px; }
        .achievement-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .achievement {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .achievement.locked { background: #e9ecef; color: #999; }
        .achievement.unlocked { background: #28a745; color: white; }
        
        .motivational-quote {
            background: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 10px 10px 0;
            font-size: 14px;
            color: #004085;
            font-style: italic;
        }
        
        /* 原有样式 */
        .progress {
            background: #f0f0f0;
            border-radius: 10px;
            height: 30px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: -20px;
            margin-bottom: 10px;
        }
        .task-list { display: flex; flex-direction: column; gap: 15px; }
        .task {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        .task.completed { background: #d4edda; border-color: #28a745; }
        .task.current {
            background: #fff3cd;
            border-color: #ffc107;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 193, 7, 0); }
        }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .task-time { font-size: 24px; font-weight: bold; color: #333; }
        .task-medicine { font-size: 16px; color: #666; margin-bottom: 10px; }
        .task-status {
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 10px;
            background: #6c757d;
            color: white;
        }
        .task.completed .task-status { background: #28a745; }
        .task.current .task-status { background: #ffc107; color: #333; }
        .task-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 100px;
        }
        .btn-check { background: #28a745; color: white; }
        .btn-check:hover { background: #218838; transform: scale(1.05); }
        .btn-delay { background: #ffc107; color: #333; }
        .btn-delay:hover { background: #e0a800; transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .delay-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .delay-btn {
            padding: 5px 15px;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        .delay-btn:hover { background: #138496; transform: scale(1.05); }
        .info-box {
            background: #e7f3ff;
            border: 2px solid #b8daff;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #004085;
        }
        .last-update { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
        
        /* 历史记录 */
        .history-section { margin-top: 25px; }
        .history-section h3 { font-size: 16px; color: #333; margin-bottom: 10px; }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
        }
        .history-item { padding: 8px 10px; border-bottom: 1px solid #e9ecef; font-size: 13px; }
        .history-item:last-child { border-bottom: none; }
        .history-date { color: #666; font-weight: bold; }
        .history-status { float: right; }
        .history-status.completed { color: #28a745; font-weight: bold; }
        .history-status.partial { color: #ffc107; font-weight: bold; }
        .history-status.missed { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💧 眼药水提醒</h1>
            <div class="date" id="currentDate"></div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalDays">0</div>
                <div class="stat-label">累计打卡天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="consecutiveDays">0</div>
                <div class="stat-label">连续打卡天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completionRate">0%</div>
                <div class="stat-label">完成率</div>
            </div>
        </div>
        
        <div class="achievements">
            <h3>🏆 成就系统</h3>
            <div class="achievement-list" id="achievementList"></div>
        </div>
        
        <div class="motivational-quote" id="motivationalQuote"></div>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0/8 完成</div>
        
        <div class="task-list" id="taskList"></div>
        
        <div class="history-section">
            <h3>📅 历史记录</h3>
            <div class="history-list" id="historyList"></div>
        </div>
        
        <div class="info-box">
            <strong>💡 使用说明：</strong><br>
            • 点击"已滴"标记完成<br>
            • 点击"延迟"可选择推迟时间<br>
            • 延迟后后续所有时间点会自动顺延<br>
            • 刷新页面可同步最新状态<br>
            • 坚持打卡，解锁更多成就！
        </div>
        
        <div class="last-update" id="lastUpdate">最后更新：--</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Firebase配置
        const firebaseConfig = {
            apiKey: "AIzaSyC0INycOgw15McsZysYUTaCl5qZ-qGXujE",
            authDomain: "eyedrop-reminder.firebaseapp.com",
            databaseURL: "https://eyedrop-reminder-default-rtdb.firebaseio.com",
            projectId: "eyedrop-reminder",
            storageBucket: "eyedrop-reminder.firebasestorage.app",
            messagingSenderId: "1079761104680",
            appId: "1:1079761104680:web:9b1383f330087dd581aa1d"
        };
        
        // 初始化Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dataRef = database.ref('eyedropData');
        
        // 本地数据缓存
        let localData = null;
        const baseTasks = [
            { time: "08:00", medicine: "小牛血去蛋白提取物滴眼液" },
            { time: "08:30", medicine: "环孢素滴眼液（早上）" },
            { time: "09:00", medicine: "聚乙二醇滴眼液" },
            { time: "12:00", medicine: "小牛血去蛋白提取物滴眼液" },
            { time: "12:30", medicine: "聚乙二醇滴眼液" },
            { time: "20:00", medicine: "小牛血去蛋白提取物滴眼液" },
            { time: "20:30", medicine: "聚乙二醇滴眼液" },
            { time: "21:00", medicine: "环孢素滴眼液（晚上）" }
        ];
        
        const motivationalQuotes = [
            "坚持就是胜利！每一天的坚持，都是为了更好的明天。",
            "你是最棒的！继续保持，眼睛会越来越好的！",
            "每一滴眼药水，都是对自己的关爱和承诺。",
            "成功不是将来才有的，而是从决定去做的那一刻起，持续累积而成。",
            "相信自己的选择，坚持到底，你一定能行！"
        ];
        
        const achievements = [
            { id: "first_checkin", name: "初次打卡", unlocked: false },
            { id: "three_days", name: "三天连击", unlocked: false },
            { id: "seven_days", name: "一周坚持", unlocked: false },
            { id: "fourteen_days", name: "两周达标", unlocked: false },
            { id: "thirty_days", name: "满月成就", unlocked: false },
            { id: "perfect_day", name: "完美一天", unlocked: false },
            { id: "consistent", name: "坚持不懈", unlocked: false },
            { id: "dedicated", name: "专注达人", unlocked: false },
            { id: "master", name: "眼药水大师", unlocked: false }
        ];
        
        // 从Firebase加载数据
        function loadData(callback) {
            dataRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    localData = data;
                    if (callback) callback(data);
                } else {
                    // 如果没有数据，创建初始数据
                    createInitialData();
                }
            });
        }
        
        // 创建初始数据
        function createInitialData() {
            const today = getTodayDateString();
            const initialData = {
                tasks: baseTasks.map((task, index) => ({
                    ...task, id: index + 1,
                    completed: false, completedAt: null,
                    delayed: false, delayMinutes: 0, newTime: task.time
                })),
                stats: { totalDays: 0, consecutiveDays: 0, completionRate: 0 },
                achievements: achievements.map(a => ({ ...a })),
                history: {},
                lastUpdate: new Date().toISOString(),
                startDate: today
            };
            saveData(initialData);
        }
        
        // 保存数据到Firebase
        function saveData(data) {
            localData = data;
            data.lastUpdate = new Date().toISOString();
            dataRef.set(data);
        }
        
        function getTodayDateString() {
            return new Date().toISOString().split('T')[0];
        }
        
        function initTodayData(data) {
            const today = getTodayDateString();
            if (!data.history[today]) {
                data.tasks = baseTasks.map((task, index) => ({
                    ...task, id: index + 1,
                    completed: false, completedAt: null,
                    delayed: false, delayMinutes: 0, newTime: task.time
                }));
                data.history[today] = { date: today, completed: 0, total: baseTasks.length, status: 'pending' };
                saveData(data);
            }
        }
        
        function updateStats(data) {
            const dates = Object.keys(data.history).sort().reverse();
            let totalDays = 0, consecutiveDays = 0, totalTasks = 0, completedTasks = 0;
            
            for (const date of dates) {
                const dayData = data.history[date];
                if (dayData.status !== 'pending') {
                    totalDays++;
                    totalTasks += dayData.total;
                    completedTasks += dayData.completed;
                    if (dayData.status === 'completed') consecutiveDays++;
                    else break;
                }
            }
            
            data.stats.totalDays = totalDays;
            data.stats.consecutiveDays = consecutiveDays;
            data.stats.completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            checkAchievements(data);
            saveData(data);
        }
        
        function checkAchievements(data) {
            const today = getTodayDateString();
            if (data.history[today].completed > 0) unlockAchievement(data, 'first_checkin');
            if (data.stats.consecutiveDays >= 3) unlockAchievement(data, 'three_days');
            if (data.stats.consecutiveDays >= 7) unlockAchievement(data, 'seven_days');
            if (data.stats.consecutiveDays >= 14) unlockAchievement(data, 'fourteen_days');
            if (data.stats.consecutiveDays >= 30) unlockAchievement(data, 'thirty_days');
            if (data.history[today].completed === data.history[today].total) unlockAchievement(data, 'perfect_day');
            if (data.stats.totalDays >= 15) unlockAchievement(data, 'consistent');
            if (data.stats.totalDays >= 20) unlockAchievement(data, 'master');
            if (data.stats.completionRate >= 80) unlockAchievement(data, 'dedicated');
        }
        
        function unlockAchievement(data, achievementId) {
            const achievement = data.achievements.find(a => a.id === achievementId);
            if (achievement && !achievement.unlocked) achievement.unlocked = true;
        }
        
        function renderStats(data) {
            document.getElementById('totalDays').textContent = data.stats.totalDays;
            document.getElementById('consecutiveDays').textContent = data.stats.consecutiveDays;
            document.getElementById('completionRate').textContent = data.stats.completionRate + '%';
        }
        
        function renderAchievements(data) {
            const achievementList = document.getElementById('achievementList');
            achievementList.innerHTML = '';
            data.achievements.forEach(achievement => {
                const div = document.createElement('div');
                div.className = `achievement ${achievement.unlocked ? 'unlocked' : 'locked'}`;
                div.textContent = achievement.unlocked ? `✅ ${achievement.name}` : `🔒 ${achievement.name}`;
                div.title = achievement.name;
                achievementList.appendChild(div);
            });
        }
        
        function renderMotivationalQuote() {
            const quoteDiv = document.getElementById('motivationalQuote');
            const randomIndex = Math.floor(Math.random() * motivationalQuotes.length);
            quoteDiv.textContent = motivationalQuotes[randomIndex];
        }
        
        function renderTasks() {
            loadData(function(data) {
                initTodayData(data);
                updateStats(data);
                
                const taskList = document.getElementById('taskList');
                taskList.innerHTML = '';
                
                let completedCount = 0;
                const now = new Date();
                const currentTimeStr = now.toTimeString().slice(0, 5);
                
                data.tasks.forEach((task, index) => {
                    if (task.completed) completedCount++;
                    
                    const taskEl = document.createElement('div');
                    taskEl.className = 'task';
                    if (task.completed) taskEl.classList.add('completed');
                    
                    const isCurrent = !task.completed && !task.delayed && task.time >= currentTimeStr;
                    if (isCurrent) taskEl.classList.add('current');
                    
                    taskEl.innerHTML = `
                        <div class="task-header">
                            <div class="task-time">${task.delayed ? task.newTime : task.time}</div>
                            <div class="task-status">${task.completed ? '已完成' : (task.delayed ? '已延迟' : '待完成')}</div>
                        </div>
                        <div class="task-medicine">${task.medicine}</div>
                        <div class="task-actions">
                            <button class="btn btn-check" onclick="checkIn(${index})" ${task.completed ? 'disabled' : ''}>
                                ${task.completed ? '✓ 已滴' : '已滴'}
                            </button>
                            <button class="btn btn-delay" onclick="showDelayOptions(${index})" ${task.completed || task.delayed ? 'disabled' : ''}>
                                ${task.delayed ? '已延迟' : '延迟'}
                            </button>
                        </div>
                        <div class="delay-buttons" id="delayButtons${index}" style="display: none;">
                            <button class="delay-btn" onclick="delay(${index}, 30)">+30分钟</button>
                            <button class="delay-btn" onclick="delay(${index}, 60)">+1小时</button>
                            <button class="delay-btn" onclick="delay(${index}, 120)">+2小时</button>
                        </div>
                    `;
                    taskList.appendChild(taskEl);
                });
                
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');
                const progress = (completedCount / data.tasks.length) * 100;
                progressBar.style.width = progress + '%';
                progressText.textContent = `${completedCount}/${data.tasks.length} 完成`;
                
                const today = getTodayDateString();
                if (completedCount === data.tasks.length) data.history[today].status = 'completed';
                else if (completedCount > 0) data.history[today].status = 'partial';
                data.history[today].completed = completedCount;
                saveData(data);
                
                renderStats(data);
                renderAchievements(data);
                renderMotivationalQuote();
                renderHistory(data);
                
                document.getElementById('lastUpdate').textContent = `最后更新：${new Date(data.lastUpdate).toLocaleString('zh-CN')}`;
            });
        }
        
        function renderHistory(data) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            const dates = Object.keys(data.history).sort().reverse();
            dates.forEach(date => {
                const dayData = data.history[date];
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const statusClass = dayData.status === 'completed' ? 'completed' :
                                 dayData.status === 'partial' ? 'partial' : 'missed';
                const statusText = dayData.status === 'completed' ? '✅ 完成' :
                                  dayData.status === 'partial' ? '⚠️ 部分完成' : '❌ 未完成';
                
                div.innerHTML = `
                    <span class="history-date">${date}</span>
                    <span class="history-status ${statusClass}">${dayData.completed}/${dayData.total} ${statusText}</span>
                `;
                historyList.appendChild(div);
            });
        }
        
        function showCurrentDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }
        
        function checkIn(index) {
            loadData(function(data) {
                data.tasks[index].completed = true;
                data.tasks[index].completedAt = new Date().toISOString();
                saveData(data);
                renderTasks();
                alert('打卡成功！💪');
            });
        }
        
        function showDelayOptions(index) {
            const delayButtons = document.getElementById(`delayButtons${index}`);
            delayButtons.style.display = delayButtons.style.display === 'none' ? 'flex' : 'none';
        }
        
        function delay(index, minutes) {
            loadData(function(data) {
                data.tasks[index].delayed = true;
                data.tasks[index].delayMinutes = minutes;
                
                const originalTime = new Date(`2026-04-15T${data.tasks[index].time}:00`);
                originalTime.setMinutes(originalTime.getMinutes() + minutes);
                data.tasks[index].newTime = originalTime.toTimeString().slice(0, 5);
                
                for (let i = index + 1; i < data.tasks.length; i++) {
                    if (!data.tasks[i].completed) {
                        const taskTime = new Date(`2026-04-15T${data.tasks[i].time}:00`);
                        taskTime.setMinutes(taskTime.getMinutes() + minutes);
                        data.tasks[i].newTime = taskTime.toTimeString().slice(0, 5);
                        data.tasks[i].delayed = true;
                        data.tasks[i].delayMinutes = minutes;
                    }
                }
                
                saveData(data);
                renderTasks();
                alert(`已延迟 ${minutes} 分钟，后续任务已自动顺延！`);
            });
        }
        
        showCurrentDate();
        renderTasks();
        
        // 实时监听数据变化
        dataRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && JSON.stringify(data) !== JSON.stringify(localData)) {
                renderTasks();
            }
        });
    </script>
</body>
</html>
